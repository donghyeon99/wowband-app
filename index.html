<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WowBand</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #0a0a0e;
        color: #e5e7eb;
        font-family: system-ui, -apple-system, sans-serif;
        line-height: 1.4;
      }
      .page {
        max-width: 1100px;
        margin: 0 auto;
      }
      main {
        padding: 1.25rem 1.5rem 0 1.5rem;
      }
      .note {
        margin: 0 0 1rem 0;
        font-size: 0.75rem;
        color: #6b6b7e;
      }
      /* sticky Header (~64px) + Tabs (~50px) ≈ 114px. 130px 버퍼로 주면
         scrollIntoView 류 navigation 시 hero card 가 가려지지 않음. */
      html { scroll-padding-top: 130px; }
      main section { scroll-margin-top: 130px; }
    </style>
  </head>
  <body>
    <div class="page">
      <div id="header-mount"></div>
      <div id="visualizer-header-mount"></div>
      <div id="tabs-mount"></div>
      <main>
        <p class="note">Chromium-only (Chrome / Edge). Requires HTTPS or localhost. Replay is dev-only.</p>
        <div id="eeg-container"></div>
        <div id="ppg-container"></div>
        <div id="acc-container"></div>
      </main>
      <div id="footer-mount"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
